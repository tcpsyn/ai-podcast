    <!-- Body -->
    <path d="M32 26c-5 1-9 5-10 10l-1 6c0 1 1 2 2 2h3"/>
    <path d="M32 26c5 1 9 5 10 10l1 6c0 1-1 2-2 2h-3"/>
    <!-- Tail feathers -->
